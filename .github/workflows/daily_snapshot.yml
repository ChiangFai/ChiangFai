name: Daily Fire Snapshot

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily (1pm Bangkok)
  workflow_dispatch:      # also allows manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch FIRMS snapshot
        run: python real_time_alerts.py

      - name: Commit snapshot
        run: |
          git config user.name "ChiangFai Bot"
          git config user.email "chiangfai@sawasdeetour.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
          git push
